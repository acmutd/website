name: Sync Firebase Officer Images

on:
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run without creating PR'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Create Firebase config
        run: |
          cat <<'EOF' > firebase-config.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run sync script
        env:
          FIREBASE_CONFIG_PATH: firebase-config.json
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/sync-firebase-images.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet public/assets/officer/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true' && (github.event.inputs.dry_run || 'false') == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/assets/officer/
          git commit -m "chore: sync officer images from firebase"
          git push

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true' && (github.event.inputs.dry_run || 'false') == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: sync officer images from firebase'
          title: 'chore: sync officer images from firebase'
          body: |
            This PR automatically syncs officer images from Firebase Storage.

            **Changes:**
            - Updated images in `public/assets/officer/`

            Generated by: [Sync Firebase Officer Images](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          branch: sync/firebase-officer-images
          delete-branch: true
          labels: automated

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Images were updated" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]; then
              echo "📝 Dry run mode - no PR created" >> $GITHUB_STEP_SUMMARY
            else
              echo "📝 PR created successfully" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
